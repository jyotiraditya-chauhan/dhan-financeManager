name: Daily Streak

on:
  schedule:
    - cron: '0 18 * * *'  # 11:30 PM IST
  workflow_dispatch:       # manual trigger button

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Daily log
        run: |
          mkdir -p log
          DATE=$(date +%Y-%m-%d)
          echo "# $DATE" > "log/$DATE.md"
          echo "Streak maintained." >> "log/$DATE.md"

      - name: Commit & push
        run: |
          git config user.email "your@email.com"
          git config user.name "Aditya"
          git add .
          git diff --staged --quiet || git commit -m "chore: daily log $(date +%Y-%m-%d)"
          git push
